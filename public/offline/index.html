<!doctype html>
<html lang="en" data-theme="light" data-font="outfit">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrackLearn Offline</title>
  <meta name="theme-color" content="#0f766e" />
  <style>
    :root { color-scheme: light; --surface:#f4fbfa; --surface-alt:#e8f6f4; --panel:#ffffff; --panel-alt:#eff8f6; --foreground:#123634; --muted:#567370; --accent:#0f766e; --accent-strong:#0b5b56; --accent-soft:rgba(15,118,110,.12); --border:#cae5e1; --shadow:0 18px 40px rgba(15,118,110,.12); --code-bg:#ebf5f4; --quote-bg:#edf8f7; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    html[data-theme="dark"] { color-scheme: dark; --surface:#081717; --surface-alt:#102525; --panel:#10211f; --panel-alt:#132a28; --foreground:#e6f7f4; --muted:#8fb5b0; --accent:#0f766e; --accent-strong:#0b5b56; --accent-soft:rgba(15,118,110,.16); --border:#1f3f3b; --shadow:0 24px 48px rgba(0,0,0,.35); --code-bg:#132826; --quote-bg:#122725; }
    html[data-theme="reading"] { color-scheme: light; --surface:#f7efcf; --surface-alt:#f2e8c0; --panel:#fbf5da; --panel-alt:#f4ebc5; --foreground:#544e3f; --muted:#7b725c; --accent:#2c7a74; --accent-strong:#20625d; --accent-soft:rgba(44,122,116,.12); --border:#ddd1a4; --shadow:0 18px 36px rgba(94,83,45,.12); --code-bg:#efe4ba; --quote-bg:#f1e7c1; }
    html[data-font="serif"] body { font-family: Georgia, "Times New Roman", serif; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:radial-gradient(circle at top left, rgba(15,118,110,.1), transparent 24rem), linear-gradient(180deg, var(--surface-alt), var(--surface)); color:var(--foreground); }
    a { color:inherit; text-decoration:none; }
    button, input { font:inherit; }
    .topbar { position:sticky; top:0; z-index:40; border-bottom:1px solid var(--border); background:color-mix(in srgb,var(--surface) 88%,transparent); backdrop-filter:blur(12px); }
    .topbar-inner { max-width:1600px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 16px; }
    .brand-row, .actions { display:flex; align-items:center; gap:10px; }
    .brand { font-size:18px; font-weight:700; letter-spacing:0; }
    .pill, .status-pill { display:inline-flex; align-items:center; border-radius:999px; border:1px solid transparent; padding:4px 10px; font-size:12px; font-weight:700; }
    .pill { border-color:rgba(245,158,11,.35); background:rgba(245,158,11,.15); color:#92400e; }
    html[data-theme="dark"] .pill { color:#fbbf24; }
    .icon-button, .button-secondary, .button-primary { border-radius:999px; cursor:pointer; transition:transform 180ms ease, border-color 180ms ease, background-color 180ms ease; }
    .icon-button { display:inline-flex; align-items:center; justify-content:center; width:44px; height:44px; border:1px solid var(--border); background:color-mix(in srgb,var(--panel) 94%,transparent); color:var(--foreground); }
    .button-secondary { border:1px solid var(--border); background:color-mix(in srgb,var(--panel) 94%,transparent); color:var(--foreground); padding:12px 16px; font-weight:700; }
    .button-primary { border:1px solid var(--accent); background:var(--accent); color:white; padding:12px 16px; font-weight:700; }
    .button-secondary:hover, .button-primary:hover, .icon-button:hover { transform:translateY(-1px); border-color:var(--accent); }
    .button-primary:hover { background:var(--accent-strong); }
    .layout { max-width:1600px; margin:0 auto; display:grid; grid-template-columns:minmax(0,1fr); gap:16px; padding:16px; }
    .with-sidebar { grid-template-columns:360px minmax(0,1fr); }
    .panel { border:1px solid var(--border); background:color-mix(in srgb,var(--panel) 94%,transparent); box-shadow:var(--shadow); border-radius:12px; }
    .sidebar { position:sticky; top:86px; height:calc(100vh - 104px); overflow:auto; padding:20px; }
    .main { min-width:0; display:grid; gap:16px; }
    .hero { padding:24px; }
    .eyebrow { margin:0; color:var(--muted); font-size:12px; font-weight:800; letter-spacing:.24em; text-transform:uppercase; }
    h1 { margin:12px 0 0; font-size:clamp(30px,4vw,44px); line-height:1.1; letter-spacing:0; }
    h2 { margin:0; font-size:24px; line-height:1.2; letter-spacing:0; }
    p { line-height:1.65; }
    .muted { color:var(--muted); }
    .grid { display:grid; gap:16px; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); }
    .card { display:block; width:100%; border:1px solid var(--border); border-radius:12px; background:color-mix(in srgb,var(--panel) 94%,transparent); color:var(--foreground); padding:24px; text-align:left; cursor:pointer; transition:transform 180ms ease, border-color 180ms ease; }
    .card:hover { transform:translateY(-2px); border-color:var(--accent); }
    .row { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .stack { display:grid; gap:16px; }
    .sidebar-section { display:grid; gap:10px; margin-top:20px; }
    .side-link { display:block; border:1px solid var(--border); border-radius:10px; background:var(--panel-alt); padding:12px; text-align:left; }
    .side-link.active { border-color:var(--accent); background:var(--accent-soft); }
    .status-done { background:rgba(16,185,129,.15); color:#047857; }
    .status-revise { background:rgba(245,158,11,.18); color:#92400e; }
    .status-offline { background:var(--accent-soft); color:var(--accent-strong); }
    .module-actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; }
    .markdown-body { font-size:1.02rem; line-height:1.8; padding:24px; }
    .markdown-body > * + * { margin-top:1.1rem; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin-top:2.3rem; margin-bottom:.85rem; font-weight:700; line-height:1.2; }
    .markdown-body h1 { font-size:clamp(2rem,3vw,2.8rem); }
    .markdown-body h2 { font-size:clamp(1.55rem,2vw,2rem); }
    .markdown-body h3 { font-size:clamp(1.2rem,1.6vw,1.45rem); }
    .markdown-body ul, .markdown-body ol { padding-left:1.35rem; }
    .markdown-body blockquote { border-left:4px solid var(--accent); background:var(--quote-bg); padding:1rem 1.2rem; border-radius:1rem; color:var(--muted); }
    .markdown-body code { border-radius:.5rem; background:var(--code-bg); padding:.15rem .4rem; font-size:.92em; }
    .markdown-body pre { overflow:auto; border-radius:1.4rem; border:1px solid var(--border); background:var(--code-bg); padding:1rem 1.1rem; }
    .hidden { display:none !important; }
    @media (max-width: 1023px) { .with-sidebar { grid-template-columns:1fr; } .sidebar { position:static; height:auto; } }
    @media (max-width: 640px) { .topbar-inner { align-items:flex-start; flex-direction:column; } .actions { width:100%; justify-content:space-between; } .hero, .markdown-body, .card { padding:20px; } }
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-row">
          <a class="brand" href="/offline">TrackLearn</a>
          <span class="pill">Offline</span>
        </div>
        <div class="actions">
          <button class="icon-button" id="font-toggle" type="button" title="Switch font">F</button>
          <button class="icon-button" id="theme-toggle" type="button" title="Switch display mode">Theme</button>
        </div>
      </div>
    </header>
    <div class="layout" id="layout">
      <main class="main" id="main">
        <section class="panel hero">
          <p class="eyebrow">Offline Library</p>
          <h1>Loading downloaded courses...</h1>
          <p class="muted">Opening local device storage.</p>
        </section>
      </main>
    </div>
  </div>
  <script src="/offline/offline-app.js"></script>
</body>
</html>
